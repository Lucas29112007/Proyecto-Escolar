<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>E.E.S.T Nº3 Islas Malvinas</title>
    <link rel="preload" as="image" href="logon3.png">
<link rel="stylesheet" href="hi.css">
</head>
<body>

    <header>
        <div class="container header-container">
            <div class="brand">
<img src="logon3.png" width="120" height="120" loading="eager" decoding="sync" fetchpriority="high" alt="Logo del colegio" class="logo">
            <h1>E.E.S.T Nº3 "Islas Malvinas"</h1>
</div>
              <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="galeria.html" class="is-active">Galería</a></li>
                    <li><a href="noticias.html">Noticias</a></li>
                    <li><a href="CONTACTO.HTML">Contacto</a></li>
                    <li><a href="d1.html">Centro de Estudiantes</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <!-- GALERÍA -->
    <section id="galeria" class="section no-hover">
        <div class="container">
            <h2>Galería</h2>
            <div class="carousel">
                <button onclick="cambiarImagen(-1)">❮</button>
                <img id="imagen-carrusel" src="Assets/imagen1.jpg" alt="Galería" style="max-width: 600px; border-radius: 12px;">
                <button onclick="cambiarImagen(1)">❯</button>
            </div>
            <div class="puntos" id="indicadores"></div>
        </div>
    </section>

    <script>
        const imagenesGaleria = [
            'Assets/imagen1.jpg',
            'Assets/imagen2.jpg',
            'Assets/imagen3.jpg',
            'Assets/imagen4.jpg'
        ];
        let indiceGaleria = 0;

        function cambiarImagen(direccion) {
            indiceGaleria = (indiceGaleria + direccion + imagenesGaleria.length) % imagenesGaleria.length;
            document.getElementById('imagen-carrusel').src = imagenesGaleria[indiceGaleria];
        }
    </script>
    <script src="ui.js"></script>
</body>
</html>
